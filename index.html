<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Face Detection</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 30px;
      background: #f0f0f0;
    }
    h1 { font-size: 22px; margin-bottom: 20px; }
    button {
      padding: 10px 24px;
      font-size: 14px;
      margin: 8px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background: #2196F3;
      color: white;
    }
    button:disabled { background: #aaa; cursor: not-allowed; }
    #webcam-container { margin: 16px auto; }
    #webcam-container canvas { border-radius: 8px; }
    #label-container div {
      font-size: 15px;
      padding: 5px 0;
    }
    #status { color: gray; font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>

  <h1>Face Detection — Teachable Machine</h1>

  <button id="btn-start" onclick="start()">Mulai</button>
  <button id="btn-stop" onclick="stop()" disabled>Stop</button>

  <p id="status">Klik "Mulai" untuk memulai deteksi.</p>

  <div id="webcam-container"></div>
  <div id="label-container"></div>

  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/0B7mthiO1/";
    let model, webcam, running = false;

    async function start() {
      document.getElementById('btn-start').disabled = true;
      document.getElementById('status').textContent = "Memuat model...";

      model = await tmImage.load(URL + "model.json", URL + "metadata.json");

      webcam = new tmImage.Webcam(300, 300, true);
      await webcam.setup();
      await webcam.play();

      document.getElementById('webcam-container').appendChild(webcam.canvas);

      const labelContainer = document.getElementById('label-container');
      labelContainer.innerHTML = '';
      for (let i = 0; i < model.getTotalClasses(); i++) {
        labelContainer.appendChild(document.createElement('div'));
      }

      running = true;
      document.getElementById('btn-stop').disabled = false;
      document.getElementById('status').textContent = "Mendeteksi...";
      loop();
    }

    async function loop() {
      if (!running) return;
      webcam.update();
      const preds = await model.predict(webcam.canvas);
      const labels = document.getElementById('label-container').children;
      preds.forEach((p, i) => {
        labels[i].textContent = `${p.className}: ${(p.probability * 100).toFixed(1)}%`;
      });
      requestAnimationFrame(loop);
    }

    function stop() {
      running = false;
      webcam.stop();
      document.getElementById('webcam-container').innerHTML = '';
      document.getElementById('label-container').innerHTML = '';
      document.getElementById('btn-start').disabled = false;
      document.getElementById('btn-stop').disabled = true;
      document.getElementById('status').textContent = 'Dihentikan. Klik "Mulai" untuk memulai lagi.';
    }
  </script>

</body>
</html>
