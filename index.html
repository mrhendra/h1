<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Deteksi Wajah - Teachable Machine</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
      background: linear-gradient(135deg, #7f77dd, #5dcaa5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 2rem;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 1.5rem;
      width: 100%;
      max-width: 560px;
      margin-bottom: 1.5rem;
    }

    .card label {
      display: block;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 0.4rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .url-row {
      display: flex;
      gap: 0.5rem;
    }

    .url-row input {
      flex: 1;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      color: #e0e0f0;
      font-size: 0.9rem;
      padding: 0.6rem 0.9rem;
      outline: none;
      transition: border 0.2s;
    }

    .url-row input:focus {
      border-color: #7f77dd;
    }

    .btn {
      background: linear-gradient(135deg, #534ab7, #0f6e56);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1.2rem;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-secondary {
      background: transparent;
      border: 1px solid #2a2a4a;
      color: #e0e0f0;
    }

    .btn-secondary:hover { border-color: #7f77dd; background: rgba(127,119,221,0.1); }

    .controls {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      padding: 0.5rem 0.9rem;
      border-radius: 8px;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      margin-top: 1rem;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #444;
      flex-shrink: 0;
    }

    .dot.active { background: #5dcaa5; box-shadow: 0 0 6px #5dcaa5; animation: pulse 1.2s infinite; }
    .dot.error  { background: #e24b4a; }
    .dot.loading { background: #ef9f27; animation: pulse 0.6s infinite; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .video-section {
      width: 100%;
      max-width: 560px;
      display: none;
    }

    .video-section.visible { display: block; }

    .video-wrapper {
      position: relative;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 4/3;
    }

    #webcam-canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .overlay-info {
      position: absolute;
      top: 0.7rem;
      left: 0.7rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .face-badge {
      background: rgba(0,0,0,0.65);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 0.25rem 0.55rem;
      font-size: 0.78rem;
      font-weight: 500;
      color: #fff;
      backdrop-filter: blur(4px);
    }

    .fps-badge {
      background: rgba(0,0,0,0.5);
      border-radius: 5px;
      padding: 0.2rem 0.45rem;
      font-size: 0.72rem;
      color: #aaa;
    }

    .results-card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 0 0 12px 12px;
      padding: 1rem 1.25rem;
      border-top: none;
    }

    .result-row {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin-bottom: 0.6rem;
    }

    .result-row:last-child { margin-bottom: 0; }

    .result-label {
      font-size: 0.83rem;
      color: #bbb;
      width: 120px;
      flex-shrink: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .bar-bg {
      flex: 1;
      height: 8px;
      background: #0f0f1a;
      border-radius: 4px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.15s ease;
      background: linear-gradient(90deg, #534ab7, #5dcaa5);
    }

    .bar-fill.top { background: linear-gradient(90deg, #7f77dd, #5dcaa5); }

    .result-pct {
      font-size: 0.83rem;
      font-weight: 600;
      width: 38px;
      text-align: right;
      color: #e0e0f0;
    }

    .top-label {
      position: absolute;
      bottom: 0.7rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(83,74,183,0.85);
      border: 1px solid rgba(127,119,221,0.5);
      border-radius: 8px;
      padding: 0.3rem 0.8rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      backdrop-filter: blur(4px);
      max-width: 90%;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .info-text {
      font-size: 0.8rem;
      color: #666;
      margin-top: 0.6rem;
      line-height: 1.5;
    }

    .info-text a {
      color: #7f77dd;
      text-decoration: none;
    }

    .info-text a:hover { text-decoration: underline; }

    .error-msg {
      color: #e24b4a;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      display: none;
    }
  </style>
</head>
<body>

  <h1>Deteksi Wajah</h1>
  <p class="subtitle">Powered by Teachable Machine + TensorFlow.js</p>

  <div class="card">
    <label>URL Model Teachable Machine</label>
    <div class="url-row">
      <input type="text" id="model-url"
        placeholder="https://teachablemachine.withgoogle.com/models/XXXXX/"
        value="https://teachablemachine.withgoogle.com/models/bXy2kDNi/" />
      <button class="btn" onclick="loadAndStart()">Muat & Mulai</button>
    </div>

    <div class="controls">
      <button class="btn btn-secondary" id="btn-stop" onclick="stopCam()" disabled>Hentikan</button>
      <button class="btn btn-secondary" onclick="flipCamera()" id="btn-flip" disabled>Balik Kamera</button>
    </div>

    <div class="status-bar">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">Masukkan URL model dan klik "Muat & Mulai"</span>
    </div>

    <p class="error-msg" id="error-msg"></p>

    <p class="info-text">
      Buat model Anda sendiri di
      <a href="https://teachablemachine.withgoogle.com/train/image" target="_blank">
        teachablemachine.withgoogle.com
      </a>, lalu salin URL model ke kotak di atas.
    </p>
  </div>

  <div class="video-section" id="video-section">
    <div class="video-wrapper">
      <canvas id="webcam-canvas"></canvas>
      <div class="overlay-info">
        <div class="face-badge" id="face-count">Menunggu...</div>
        <div class="fps-badge" id="fps-badge">0 FPS</div>
      </div>
      <div class="top-label" id="top-label" style="display:none"></div>
    </div>
    <div class="results-card" id="results-container"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.5/dist/teachablemachine-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7/dist/blazeface.min.js"></script>

  <script>
    let model, webcam, maxPredictions;
    let running = false;
    let facingMode = "user";
    let lastTime = performance.now();
    let frameCount = 0;
    let faceModel = null;

    function setStatus(text, state) {
      document.getElementById("status-text").textContent = text;
      const dot = document.getElementById("status-dot");
      dot.className = "dot " + (state || "");
    }

    function showError(msg) {
      const el = document.getElementById("error-msg");
      el.textContent = msg;
      el.style.display = "block";
      setStatus("Gagal memuat", "error");
    }

    function hideError() {
      document.getElementById("error-msg").style.display = "none";
    }

    async function loadAndStart() {
      hideError();
      if (running) await stopCam();

      let url = document.getElementById("model-url").value.trim();
      if (!url.endsWith("/")) url += "/";

      setStatus("Memuat model...", "loading");

      try {
        const modelURL = url + "model.json";
        const metaURL  = url + "metadata.json";

        model = await tmImage.load(modelURL, metaURL);
        maxPredictions = model.getTotalClasses();

        setStatus("Memuat BlazeFace...", "loading");
        faceModel = await blazeface.load();

        setStatus("Membuka kamera...", "loading");
        await startWebcam();
      } catch (e) {
        console.error(e);
        showError("Gagal memuat model. Pastikan URL benar dan model bersifat publik.");
      }
    }

    async function startWebcam() {
      const constraints = {
        video: { facingMode, width: { ideal: 640 }, height: { ideal: 480 } },
        audio: false
      };

      const stream = await navigator.mediaDevices.getUserMedia(constraints);

      const video = document.createElement("video");
      video.srcObject = stream;
      video.autoplay = true;
      video.playsInline = true;

      await new Promise(r => video.onloadedmetadata = r);
      await video.play();

      const canvas = document.getElementById("webcam-canvas");
      canvas.width  = video.videoWidth  || 640;
      canvas.height = video.videoHeight || 480;
      const ctx = canvas.getContext("2d");

      webcam = { video, stream, ctx };

      document.getElementById("video-section").classList.add("visible");
      document.getElementById("btn-stop").disabled  = false;
      document.getElementById("btn-flip").disabled  = false;

      buildResultRows();
      running = true;
      setStatus("Berjalan — deteksi aktif", "active");
      loop();
    }

    function buildResultRows() {
      const container = document.getElementById("results-container");
      container.innerHTML = "";
      const classes = model.getClassLabels ? model.getClassLabels() : [];

      for (let i = 0; i < maxPredictions; i++) {
        const label = classes[i] || `Kelas ${i}`;
        const row = document.createElement("div");
        row.className = "result-row";
        row.innerHTML = `
          <span class="result-label" title="${label}">${label}</span>
          <div class="bar-bg"><div class="bar-fill" id="bar-${i}" style="width:0%"></div></div>
          <span class="result-pct" id="pct-${i}">0%</span>
        `;
        container.appendChild(row);
      }
    }

    async function loop() {
      if (!running) return;

      const { video, ctx } = webcam;
      const canvas = document.getElementById("webcam-canvas");

      ctx.save();
      if (facingMode === "user") {
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
      }
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      ctx.restore();

      try {
        const faces = await faceModel.estimateFaces(video, false);
        const faceCount = document.getElementById("face-count");

        if (faces.length > 0) {
          faceCount.textContent = `${faces.length} wajah terdeteksi`;
          faces.forEach(face => {
            const [x1, y1] = face.topLeft;
            const [x2, y2] = face.bottomRight;
            let rx = facingMode === "user" ? canvas.width - x2 : x1;
            let ry = y1;
            let rw = x2 - x1;
            let rh = y2 - y1;

            ctx.strokeStyle = "#7f77dd";
            ctx.lineWidth = 2;
            ctx.strokeRect(rx, ry, rw, rh);

            ctx.fillStyle = "rgba(127,119,221,0.15)";
            ctx.fillRect(rx, ry, rw, rh);
          });
        } else {
          faceCount.textContent = "Tidak ada wajah";
        }
      } catch(e) {}

      const predictions = await model.predict(canvas);
      let topClass = "", topProb = 0;

      predictions.forEach((p, i) => {
        const pct = Math.round(p.probability * 100);
        const bar = document.getElementById(`bar-${i}`);
        const txt = document.getElementById(`pct-${i}`);
        if (bar) {
          bar.style.width = pct + "%";
          bar.className = "bar-fill" + (p.probability === Math.max(...predictions.map(x=>x.probability)) ? " top" : "");
        }
        if (txt) txt.textContent = pct + "%";
        if (p.probability > topProb) { topProb = p.probability; topClass = p.className; }
      });

      const topLabel = document.getElementById("top-label");
      if (topClass && topProb > 0.5) {
        topLabel.textContent = `${topClass} (${Math.round(topProb*100)}%)`;
        topLabel.style.display = "block";
      } else {
        topLabel.style.display = "none";
      }

      frameCount++;
      const now = performance.now();
      if (now - lastTime >= 1000) {
        document.getElementById("fps-badge").textContent = frameCount + " FPS";
        frameCount = 0;
        lastTime = now;
      }

      requestAnimationFrame(loop);
    }

    async function stopCam() {
      running = false;
      if (webcam && webcam.stream) {
        webcam.stream.getTracks().forEach(t => t.stop());
        webcam = null;
      }
      document.getElementById("video-section").classList.remove("visible");
      document.getElementById("btn-stop").disabled  = true;
      document.getElementById("btn-flip").disabled  = true;
      setStatus("Kamera dihentikan");
    }

    async function flipCamera() {
      facingMode = facingMode === "user" ? "environment" : "user";
      if (webcam && webcam.stream) {
        webcam.stream.getTracks().forEach(t => t.stop());
      }
      await startWebcam();
    }
  </script>
</body>
</html>
